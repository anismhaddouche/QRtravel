# Render Blueprint — QR Check-In (Free Tier)
# Deploy: connect GitHub repo, Render auto-detects this file

databases:
  - name: qrcheckin-db
    plan: free
    databaseName: qrcheckin
    user: qrcheckin

services:
  - type: web
    plan: free
    name: qr-checkin
    runtime: node
    buildCommand: npm install && cd client && npm install && npx vite build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: qrcheckin-db
          property: connectionString
      - key: ADMIN_USERNAME
        value: ADMIN
      - key: ADMIN_PASSWORD
        value: ADMIN123
      - key: SESSION_SECRET
        generateValue: true
